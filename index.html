<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <article class="todo-card" data-testid="test-todo-card">
        <div class="view-mode">
          <header class="card-header">
            <span class="priority-badge high" data-testid="test-todo-priority">
              <span
                class="priority-dot"
                data-testid="test-todo-priority-indicator"
              ></span>
              High
            </span>
          </header>

          <section class="card-body">
            <h2 class="task-title" data-testid="test-todo-title">
              Meeting with Engineering team
            </h2>

            <div
              class="desc-wrapper"
              data-testid="test-todo-collapsible-section"
              id="desc-text"
            >
              <p class="task-desc" data-testid="test-todo-description">
                Discuss the new mobile app wireframes and finalize the color
                palette for the V2 launch.
              </p>
            </div>

            <button
              class="expand-btn"
              data-testid="test-todo-expand-toggle"
              aria-expanded="false"
              aria-controls="desc-text"
            >
              Show more
            </button>
          </section>

          <section class="card-meta">
            <div class="time-info">
              <time
                class="time-remaining"
                data-testid="test-todo-time-remaining"
                aria-live="polite"
              >
              </time>

              <time
                class="due-date"
                data-testid="test-todo-due-date"
                datetime="2026-04-15T17:00:00"
              >
                Apr 15 • 5:00 PM
              </time>

              <span
                class="overdue hidden"
                data-testid="test-todo-overdue-indicator"
              >
                Overdue
              </span>
            </div>

            <span class="status pending" data-testid="test-todo-status">
              Pending
            </span>

            <select
              data-testid="test-todo-status-control"
              class="status-control"
            >
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </section>

          <ul class="tags-list" data-testid="test-todo-tags" role="list">
            <li class="tag" data-testid="test-todo-tag-work">Work</li>
            <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
            <li class="tag">Design</li>
          </ul>

          <div class="card-actions">
            <!-- Toggle -->
            <label for="complete-task" class="toggle-container">
              <input
                type="checkbox"
                id="complete-task"
                data-testid="test-todo-complete-toggle"
              />
              <span class="toggle-slider"></span>
              <span class="label-text">Mark as Done</span>
            </label>

            <div class="button-group">
              <button data-testid="test-todo-edit-button" class="edit">
                Edit
              </button>
              <button data-testid="test-todo-delete-button" class="delete">
                Delete
              </button>
            </div>
          </div>
        </div>

        <div class="modal-overlay" id="modal">
          <div class="modal">
            <form class="edit-form" data-testid="test-todo-edit-form">
              <div>
                <label for="edit-title">Title </label>
                <input
                  type="text"
                  id="edit-title"
                  data-testid="test-todo-edit-title-input"
                />
              </div>
              <div>
                <label for="edit-desc">Description</label>
                <textarea
                  id="edit-desc"
                  data-testid="test-todo-edit-description-input"
                ></textarea>
              </div>

              <div>
                <label for="edit-priority">Priority</label>
                <select
                  id="edit-priority"
                  data-testid="test-todo-edit-priority-select"
                >
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High" selected>High</option>
                </select>
              </div>

              <div>
                <label for="edit-date">Due date</label>
                <input
                  type="datetime-local"
                  id="edit-date"
                  data-testid="test-todo-edit-due-date-input"
                />
              </div>
              <div class="edit-actions">
                <button type="button" data-testid="test-todo-save-button">
                  Save
                </button>
                <button type="button" data-testid="test-todo-cancel-button">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
