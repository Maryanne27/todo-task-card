<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <article class="todo-card" data-testid="test-todo-card">
        <header class="card-header">
          <span
            class="priority-badge high"
            data-testid="test-todo-priority"
            aria-label="High priority"
          >
            High
          </span>
        </header>

        <section class="card-body">
          <h2 class="task-title" data-testid="test-todo-title">
            Meeting with Engineering team
          </h2>

          <p class="task-desc" data-testid="test-todo-description">
            Discuss the new mobile app wireframes and finalize the color palette
            for the V2 launch.
          </p>
        </section>

        <section class="card-meta">
          <div class="time-info">
            <time
              class="time-remaining"
              data-testid="test-todo-time-remaining"
              aria-live="polite"
            >
            </time>

            <time
              class="due-date"
              data-testid="test-todo-due-date"
              datetime="2026-04-15T17:00:00"
            >
              Apr 15th• 5:00 PM
            </time>
          </div>

          <span class="status pending" data-testid="test-todo-status">
            Pending
          </span>
        </section>

        <ul class="tags-list" data-testid="test-todo-tags" role="list">
          <li class="tag" data-testid="test-todo-tag-work">Work</li>
          <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag">Design</li>
        </ul>

        <div class="card-actions">
          <!-- Toggle -->
          <label for="complete-task" class="toggle-container">
            <input
              type="checkbox"
              id="complete-task"
              data-testid="test-todo-complete-toggle"
            />
            <span class="toggle-slider"></span>
            <span class="label-text">Mark as Done</span>
          </label>

          <div class="button-group">
            <button data-testid="test-todo-edit-button" class="edit">
              Edit
            </button>
            <button data-testid="test-todo-delete-button" class="delete">
              Delete
            </button>
          </div>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
